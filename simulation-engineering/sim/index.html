<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Dosage Calculations and Medication Errors — Three.js Port</title>
    <style>
      :root {
        --panel-bg: #10151c;
        --panel-fg: #e8edf2;
        --accent: #20a3ac;
        --muted: #8aa0b2;
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: #0a0e13;
        color: var(--panel-fg);
        height: 100vh;
        overflow: hidden;
      }
      #app { display: grid; grid-template-columns: 1fr 420px; height: 100vh; }
      #stage { position: relative; min-width: 0; }
      #stage canvas { display: block; width: 100%; height: 100%; }
      #captions {
        position: absolute; left: 50%; bottom: 24px; transform: translateX(-50%);
        max-width: 80%; padding: 8px 16px; border-radius: 6px;
        background: rgba(0, 0, 0, 0.75); font-size: 17px; line-height: 1.4;
        display: none; text-align: center;
      }
      #captions.visible { display: block; }
      #coach-overlay {
        position: absolute; inset: 0; display: none;
        align-items: center; justify-content: center;
        background: rgba(4, 8, 12, 0.55);
      }
      #coach-overlay.visible { display: flex; }
      #mgfx-overlay {
        position: absolute; inset: 0; z-index: 1; display: none;
        align-items: center; justify-content: center; padding: 34px;
        overflow: auto;
        /* The title cards size off the stage, not the viewport: embedded in the
           demo shell the sidebar leaves the stage ~430px wide while the window
           is still ~850px, which the viewport media queries below never see. */
        container-type: inline-size;
        background:
          linear-gradient(120deg, rgba(8, 12, 17, 0.92), rgba(7, 30, 35, 0.78)),
          url('/unity/mgfx/MGFX_Sprites/pharm_medical_pattern.png') center/420px repeat;
      }
      #mgfx-overlay.visible { display: flex; }
      #mgfx-panel {
        width: min(860px, 100%); min-height: 390px; display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(210px, 300px);
        gap: 24px; align-items: center;
      }
      #mgfx-eyebrow {
        color: var(--accent); font-size: 13px; font-weight: 700;
        letter-spacing: 0.12em; text-transform: uppercase;
      }
      #mgfx-title {
        margin: 10px 0 0; font-size: 34px; line-height: 1.08;
        font-weight: 700; max-width: 14ch;
      }
      #mgfx-subtitle {
        margin-top: 8px; color: #b8c8d6; font-size: 18px; line-height: 1.3;
      }
      #mgfx-body {
        margin-top: 18px; max-width: 620px; color: #edf4f7;
        font-size: 17px; line-height: 1.52;
      }
      #mgfx-continue {
        margin-top: 24px; width: auto; min-width: 120px; display: inline-block;
        text-align: center;
      }
      #mgfx-image-wrap {
        align-self: end; display: flex; justify-content: center; min-height: 250px;
      }
      #mgfx-image {
        max-width: 100%; max-height: 420px; object-fit: contain;
        filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.35));
      }
      @container (max-width: 620px) {
        #mgfx-panel {
          grid-template-columns: 1fr; min-height: 0; gap: 12px;
          align-content: center;
        }
        #mgfx-title { font-size: 26px; max-width: 20ch; }
        #mgfx-subtitle { font-size: 16px; }
        #mgfx-body { margin-top: 12px; font-size: 15px; }
        #mgfx-image-wrap { min-height: 0; }
        #mgfx-image { max-height: 150px; }
      }
      #start-overlay {
        position: absolute; inset: 0; z-index: 3;
        display: flex; align-items: center; justify-content: center;
        background: rgba(8, 12, 17, 0.22);
      }
      #start-overlay.hidden { display: none; }
      #start-button {
        min-width: 128px; padding: 12px 18px; border-radius: 6px;
        border: 1px solid rgba(232, 237, 242, 0.74);
        background: rgba(16, 21, 28, 0.92); color: var(--panel-fg);
        font-size: 15px; font-weight: 600; cursor: pointer;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.32);
      }
      #start-button:hover,
      #start-button:focus-visible {
        border-color: var(--accent); outline: none;
      }
      #coach-box {
        max-width: 520px; background: #15202b; border: 1px solid var(--accent);
        border-radius: 10px; padding: 24px; font-size: 16px; line-height: 1.5;
      }
      #coach-box button { margin-top: 16px; }
      #panel {
        border-left: 1px solid #1d2733; background: var(--panel-bg);
        display: flex; flex-direction: column; overflow: hidden;
      }
      #panel section { padding: 14px 18px; }
      #speaker-line { border-bottom: 1px solid #1d2733; min-height: 110px; }
      #speaker-name { color: var(--accent); font-weight: 600; font-size: 13px; letter-spacing: 0.08em; }
      #line-text { margin-top: 6px; font-size: 15px; line-height: 1.5; }
      #choices { flex: 1; overflow-y: auto; }
      .tactic-group h3 {
        margin: 12px 0 6px; font-size: 12px; letter-spacing: 0.1em;
        color: var(--muted); text-transform: uppercase;
      }
      button.choice, #coach-box button, #activity-ui button, .ctl {
        display: block; width: 100%; text-align: left; margin: 6px 0; padding: 10px 12px;
        background: #1a2530; color: var(--panel-fg); border: 1px solid #2a3a4a;
        border-radius: 6px; font-size: 14px; line-height: 1.4; cursor: pointer;
      }
      button.choice:hover, button.choice:focus-visible { border-color: var(--accent); outline: none; }
      button.choice.kbd-focus { border-color: var(--accent); background: #21303d; }
      #activity-ui { display: none; }
      #activity-ui.visible { display: block; }
      #activity-ui input[type='range'] { width: 100%; }
      #activity-ui.syringe {
        border-top: 1px solid #1d2733; background: #0d141b;
      }
      #activity-title { margin: 0 0 12px; font-size: 16px; line-height: 1.3; }
      #syringe-visual {
        position: relative; height: 118px; margin: 8px 0 10px;
        background: linear-gradient(180deg, rgba(32, 163, 172, 0.12), rgba(255,255,255,0.02));
        border: 1px solid #263746; border-radius: 6px; overflow: hidden;
      }
      #syringe-visual img { position: absolute; pointer-events: none; user-select: none; }
      #syr-tube {
        left: 48px; right: 24px; top: 48px; width: calc(100% - 72px); height: 32px;
      }
      #syr-needle { right: 10px; top: 55px; width: 54px; }
      #syr-plunger { left: var(--dose-position, 13%); top: 37px; width: 56px; }
      #syr-gauge { left: 88px; right: 62px; bottom: 15px; width: calc(100% - 150px); height: 24px; }
      #syr-flare { left: var(--dose-position, 13%); top: 28px; width: 48px; opacity: 0.85; }
      #syr-bubble { left: 14px; top: 14px; width: 78px; opacity: 0.85; }
      #activity-value {
        color: #d9f5f7; font-weight: 700; margin: 6px 0 10px;
      }
      #status-bar {
        border-top: 1px solid #1d2733; font-size: 12px; color: var(--muted);
        display: flex; gap: 12px; flex-wrap: wrap;
      }
      #debug {
        border-top: 1px solid #1d2733; max-height: 220px; overflow-y: auto;
        font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted);
        white-space: pre-wrap;
      }
      #debug summary { cursor: pointer; color: var(--panel-fg); }
      #toast {
        position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
        padding: 7px 14px; border-radius: 6px; background: rgba(10, 16, 22, 0.9);
        border: 1px solid var(--accent); font-size: 13px;
        opacity: 0; transition: opacity 0.25s; pointer-events: none;
      }
      #toast.visible { opacity: 1; }
      #speaker-line.speaking #speaker-name::after {
        content: ' ●'; color: var(--accent);
        animation: pulse 1.1s ease-in-out infinite;
      }
      @keyframes pulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
      #controls { display: flex; gap: 8px; padding: 8px 18px 0; }
      #controls .ctl { width: auto; margin: 0; padding: 6px 10px; font-size: 12px; }
      #transcript {
        display: none; position: absolute; inset: 0; overflow-y: auto;
        background: rgba(8, 12, 17, 0.96); padding: 24px 32px;
      }
      #transcript.visible { display: block; }
      .transcript-turn h4 { margin: 14px 0 4px; color: var(--accent); font-size: 12px; letter-spacing: 0.06em; }
      .transcript-turn p { margin: 4px 0; font-size: 13.5px; line-height: 1.5; }
      .thought-line, .thought-text { font-style: italic; color: #b8c8d6; }
      .tactic-group h3 img { height: 16px; vertical-align: -3px; margin-right: 6px; }
      @media (max-width: 820px) {
        body {
          height: auto;
          min-height: 100vh;
          overflow: auto;
        }
        #app {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(360px, 56vh) auto;
          height: auto;
          min-height: 100vh;
        }
        #stage {
          min-height: 360px;
        }
        #panel {
          border-left: 0;
          border-top: 1px solid #1d2733;
          min-height: 44vh;
        }
        #choices {
          max-height: 42vh;
        }
        #debug {
          max-height: 150px;
        }
        #mgfx-overlay {
          padding: 22px;
        }
        #mgfx-panel {
          min-height: 320px;
          grid-template-columns: 1fr;
          gap: 12px;
        }
        #mgfx-title {
          font-size: 28px;
          max-width: 18ch;
        }
        #mgfx-image-wrap {
          min-height: 140px;
          justify-content: flex-end;
        }
        #mgfx-image {
          max-height: 180px;
        }
      }
      @media (max-width: 520px) {
        #app {
          grid-template-rows: minmax(320px, 52vh) auto;
        }
        #stage {
          min-height: 320px;
        }
        #panel section {
          padding: 12px 14px;
        }
        #controls {
          padding: 8px 14px 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="stage">
        <div id="start-overlay">
          <button id="start-button" type="button">Begin</button>
        </div>
        <div id="mgfx-overlay">
          <div id="mgfx-panel">
            <div id="mgfx-copy">
              <div id="mgfx-eyebrow"></div>
              <h1 id="mgfx-title"></h1>
              <div id="mgfx-subtitle"></div>
              <div id="mgfx-body"></div>
              <button id="mgfx-continue" class="ctl" type="button">Continue</button>
            </div>
            <div id="mgfx-image-wrap">
              <img id="mgfx-image" alt="" />
            </div>
          </div>
        </div>
        <div id="captions" aria-live="polite"></div>
        <div id="toast" role="status"></div>
        <div id="transcript">
          <div id="transcript-content"></div>
        </div>
        <div id="coach-overlay">
          <div id="coach-box">
            <div id="coach-text"></div>
            <button id="coach-dismiss" type="button">Continue</button>
          </div>
        </div>
      </div>
      <div id="panel">
        <section id="speaker-line">
          <div id="speaker-name"></div>
          <div id="line-text" aria-live="polite"></div>
        </section>
        <div id="controls">
          <button id="btn-transcript" class="ctl" type="button">Transcript</button>
          <button id="btn-restart" class="ctl" type="button">Restart</button>
        </div>
        <section id="choices" role="group" aria-label="Your responses"></section>
        <section id="activity-ui">
          <h3 id="activity-title"></h3>
          <div id="syringe-visual" aria-hidden="true">
            <img id="syr-bubble" src="/unity/mgfx/MGFX_Sprites/dme-sprites/syr-bubble.png" alt="" />
            <img id="syr-tube" src="/unity/mgfx/MGFX_Sprites/dme-sprites/syr-tube.png" alt="" />
            <img id="syr-gauge" src="/unity/mgfx/MGFX_Sprites/dme-sprites/syr-gauge.png" alt="" />
            <img id="syr-needle" src="/unity/mgfx/MGFX_Sprites/dme-sprites/syr-needle.png" alt="" />
            <img id="syr-plunger" src="/unity/mgfx/MGFX_Sprites/dme-sprites/syr-plunger.png" alt="" />
            <img id="syr-flare" src="/unity/mgfx/MGFX_Sprites/dme-sprites/syr-flare.png" alt="" />
          </div>
          <input id="activity-slider" type="range" min="0" max="30" step="1" value="0" />
          <div id="activity-value">0 units</div>
          <button id="activity-submit" type="button">Confirm</button>
        </section>
        <section id="status-bar"></section>
        <section id="debug">
          <details open>
            <summary>debug</summary>
            <div id="debug-content"></div>
          </details>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
